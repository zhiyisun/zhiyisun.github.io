# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site settings
title: Zhiyi's Blog
email: zhiyisun@gmail.com
description: >
  I am Zhiyi Sun. I like Open Source Software(OSS), especially Linux. I am also a big fan of electronics gadgets. I listen 评弹 sometimes.
baseurl: ""
url: "http://zhiyisun.github.io"
twitter_username: zhiyisun
github_username: zhiyisun

# Theme settings
theme: hacker

# Google Analytics (optional - add your tracking ID)
# google_analytics_id: UA-XXXXX-X  # Universal Analytics
# google_analytics_id: G-XXXXXXXXXX  # Google Analytics 4

# Build settings
markdown: kramdown

# Exclude spec files and Qwen files
exclude:
  - .qwen/
  - .specify/
  - specs/
  - QWEN.md
  - Gemfile
  - Gemfile.lock
  - README.md
